<script type="text/javascript">
    RED.nodes.registerType('chinese-chess',{
        category: RED._("node-red-dashboard/ui_base:ui_base.label.category"),
        color: '#a6c96a',
        defaults: {
            name: {value:""},
            group: {type: 'ui_group', required: true},
            order: {value: 0},
            width: {value: 6, validate: function(v) {
                    var width = v||0;
                    var currentGroup = $('#node-input-group').val()||this.group;
                    var groupNode = RED.nodes.node(currentGroup);
                    var valid = !groupNode || +width <= +groupNode.width;
                    $("#node-input-size").toggleClass("input-error",!valid);
                    return valid;
                }
            },
            height: {value: 6},
            chessWidth: {value:400, required:true},
            chessHeight: {value:400, required:true},
            orientation: {value:"red"},
            showControls: {value:true}
        },
        inputs:1,
        outputs:1,
        icon: "chess.svg",
        paletteLabel: 'chinese-chess',
        label: function() { return this.name || 'chinese-chess'; },
        labelStyle: function() { return this.name?"node_label_italic":""; },
        oneditprepare: function() {
            $("#node-input-size").elementSizer({
                width: "#node-input-width",
                height: "#node-input-height",
                group: "#node-input-group"
            });
        }
    });
</script>

<script type="text/html" data-template-name="chinese-chess">
    <div class="form-row">
        <label for="node-input-group"><i class="fa fa-table"></i> 分组</label>
        <input type="text" id="node-input-group">
    </div>
    <div class="form-row">
        <label><i class="fa fa-object-group"></i> 尺寸</label>
        <input type="hidden" id="node-input-width">
        <input type="hidden" id="node-input-height">
        <button class="editor-button" id="node-input-size"></button>
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> 名称</label>
        <input type="text" id="node-input-name" placeholder="动态象棋谱">
    </div>
    <div class="form-row">
        <label for="node-input-chessWidth">棋盘宽度</label>
        <input type="number" id="node-input-chessWidth" placeholder="400" style="width: 100px">
        <span>px</span>
    </div>
    <div class="form-row">
        <label for="node-input-chessHeight">棋盘高度</label>
        <input type="number" id="node-input-chessHeight" placeholder="400" style="width: 100px">
        <span>px</span>
    </div>
    <div class="form-row">
        <label for="node-input-orientation">初始视角</label>
        <select id="node-input-orientation" style="width: 150px">
            <option value="red">红方在下</option>
            <option value="black">黑方在下</option>
        </select>
    </div>
    <div class="form-row">
        <label style="width:auto" for="node-input-showControls">显示控制按钮</label>
        <input type="checkbox" id="node-input-showControls" checked>
    </div>
</script>
